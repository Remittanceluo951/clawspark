name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate package.json
        run: node -e "const pkg=require('./package.json'); if(!pkg.name || !pkg.version){ throw new Error('Invalid package.json'); }"

      - name: Validate CLI syntax
        run: bash -n ./clawspark

      - name: Validate npm tarball
        run: npm pack --dry-run

      - name: Run test suite
        run: bash ./tests/run.sh

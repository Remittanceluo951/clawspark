name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Verify package metadata
        run: |
          node -e "const pkg=require('./package.json'); if(!pkg.name || !pkg.version || !pkg.bin || !pkg.bin.clawspark){ throw new Error('Invalid package.json for publish'); }"

      - name: Validate version tag matches package.json
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          echo "PKG_VERSION=${PKG_VERSION}" >> "$GITHUB_ENV"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            EXPECTED_TAG="v${PKG_VERSION}"
            if [ "${GITHUB_REF_NAME}" != "${EXPECTED_TAG}" ]; then
              echo "Tag ${GITHUB_REF_NAME} does not match package.json version ${PKG_VERSION}. Expected ${EXPECTED_TAG}." >&2
              exit 1
            fi
          fi

      - name: Validate CLI syntax
        run: bash -n ./clawspark

      - name: Validate npm package contents
        run: npm pack --dry-run

      - name: Ensure npm token is configured
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "Missing NPM_TOKEN GitHub Actions secret." >&2
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify npm account
        run: |
          NPM_USER="$(npm whoami)"
          if [ "${NPM_USER}" != "hitechclaw" ]; then
            echo "NPM token belongs to ${NPM_USER}, expected hitechclaw." >&2
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish package
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
